[versions]
agp = "9.2.1"
cmake = "3.22.1"
ndk = "29.0.14206865"

android-compileSdk = "37"
android-minSdk = "31"
android-targetSdk = "37"
android-jvm = "17"

media3 = "1.10.1"
androidx-annotation = "1.9.1"
kotlinx-coroutines = "1.11.0"

[libraries]
androidx-annotation = { group = "androidx.annotation", name = "annotation", version.ref = "androidx-annotation" }
androidx-media3-common = { group = "androidx.media3", name = "media3-common", version.ref = "media3" }
androidx-media3-decoder = { group = "androidx.media3", name = "media3-decoder", version.ref = "media3" }
androidx-media3-exoplayer = { group = "androidx.media3", name = "media3-exoplayer", version.ref = "media3" }
kotlinx-coroutines-android = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-android", version.ref = "kotlinx-coroutines" }

[plugins]
androidLibrary = { id = "com.android.library", version.ref = "agp" }
